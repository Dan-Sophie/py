{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h3>Confirmar eliminación</h3>
    <p>¿Seguro que deseas eliminar el pedido de <strong>{{ pedido.cliente }}</strong>?</p>
    <form method="post">{% csrf_token %}
        <button type="submit" class="btn btn-danger">Eliminar</button>
        <a href="{% url 'lista_pedidos' %}" class="btn btn-light">Cancelar</a>
    </form>
</div>
{% endblock %}
