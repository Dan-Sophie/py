{% extends 'base.html' %} {% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0" style="border-radius: 15px;">
                <div class="card-header bg-primary text-white text-center" style="border-radius: 15px 15px 0 0;">
                    <h4 class="mb-0">{{ titulo }}</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        {% for field in form %}
                            <div class="form-group mb-3">
                                <label class="font-weight-bold">{{ field.label }}</label>
                                {{ field }}
                                {% if field.errors %}
                                    <small class="text-danger">{{ field.errors }}</small>
                                {% endif %}
                            </div>
                        {% endfor %}
                        <hr>
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'inventario_list' %}" class="btn btn-secondary btn-round">Cancelar</a>
                            <button type="submit" class="btn btn-success btn-round">Guardar Cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
