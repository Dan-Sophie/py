{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<section class="d-flex align-items-center justify-content-center" style="min-height: 85vh; background-color: #fcfcfc;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <div class="card shadow-lg border-0" style="border-radius: 20px; overflow: hidden;">
                    
                    <div class="text-center p-5" 
                         style="background-color: #1b5e20; color: white !important;"> <h2 class="font-weight-bold mb-1" style="color: white !important; letter-spacing: -1px;">AVIARA</h2>
                        <p class="mb-0 opacity-75" style="font-size: 0.9rem; color: white !important;">Bienvenid@ otra vez </p>
                    </div>

                    <div class="card-body p-4 p-md-5">
                        <h5 class="text-center font-weight-bold mb-4 text-dark">Inicia sesión</h5>

                        <form method="post" id="loginForm">
                            {% csrf_token %}

                            <div class="login-form-fields">
                                {{ form|crispy }}
                            </div>

                            <div class="text-right mb-3">
                                <a href="{% url 'reset_password' %}" class="small font-weight-bold" style="color: #1b5e20; text-decoration: none;">
                                    ¿Olvidaste tu contraseña? Recupérala aquí
                                </a>
                            </div>

                            <div class="mt-4">
                                <button type="submit" 
                                        class="btn btn-block py-3 shadow-sm text-white" 
                                        style="background-color: #ffc107; border-radius: 50px; font-weight: 700; border: none; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;">
                                    Ingresar
                                </button>
                            </div>
                        </form>

                        <div class="mt-4 pt-2">
                            <hr style="opacity: 0.1;">
                            <p class="text-center small mb-0 mt-3 text-muted">
                                ¿No tienes cuenta? 
                                <a href="{% url 'registro' %}" class="font-weight-bold" style="color: #1b5e20; text-decoration: none;">
                                    Regístrate aquí
                                </a>
                            </p>
                        </div>
                    </div>
                </div>

                <p class="text-center text-muted mt-4 small">
                    <i class="fas fa-shield-alt mr-1"></i> Acceso seguro al sistema Aviara
                </p>

            </div>
        </div>
    </div>
</section>

<style>
    /* Estilos para que los inputs sean proporcionales y no se corten */
    .login-form-fields input {
        display: block !important;
        width: 100% !important;
        padding: 12px 18px !important;
        font-size: 1rem !important;
        line-height: 1.5 !important;
        color: #495057;
        background-color: #fff;
        border: 2px solid #f1f3f9 !important;
        border-radius: 12px !important;
        height: auto !important;
        transition: all 0.3s ease;
    }

    /* Estilo para las etiquetas de los campos */
    .login-form-fields label {
        font-weight: 700;
        color: #343a40;
        font-size: 0.85rem;
        margin-bottom: 8px;
        text-transform: uppercase;
    }

    /* Foco en verde oscuro */
    .login-form-fields input:focus {
        outline: none !important;
        border-color: #1b5e20 !important;
        box-shadow: 0 4px 12px rgba(27, 94, 32, 0.1) !important;
    }

    /* Posicionamiento del icono del OJO */
    .password-wrapper {
        position: relative;
    }

    .toggle-password {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #adb5bd;
        z-index: 10;
        font-size: 1.1rem;
        transition: color 0.2s;
    }

    .toggle-password:hover {
        color: #1b5e20;
    }

    /* Hover del botón principal */
    button[type="submit"]:hover {
        background-color: #e0a800 !important;
        transform: translateY(-1px);
        box-shadow: 0 6px 12px rgba(255, 193, 7, 0.2) !important;
    }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Buscamos el input de tipo password que genera Crispy
        const passwordField = document.querySelector('input[type="password"]');
        
        if (passwordField) {
            // Creamos un contenedor relativo para el input y el icono
            const wrapper = document.createElement('div');
            wrapper.classList.add('password-wrapper');
            
            // Insertamos el wrapper antes del input y metemos el input dentro
            passwordField.parentNode.insertBefore(wrapper, passwordField);
            wrapper.appendChild(passwordField);

            // Creamos el icono del ojo
            const icon = document.createElement('i');
            icon.classList.add('fas', 'fa-eye', 'toggle-password');
            wrapper.appendChild(icon);

            // Evento para mostrar/ocultar
            icon.addEventListener('click', function() {
                if (passwordField.type === 'password') {
                    passwordField.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    passwordField.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            });
        }
    });
</script>
{% endblock %}
