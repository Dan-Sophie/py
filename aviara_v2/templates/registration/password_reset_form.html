{% extends "home.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center" style="margin-top: 50px;">
    <div class="col-md-5">
        <div class="card shadow border-0">
            <div class="card-body p-4">
                <h3 class="text-center fw-bold mb-3 text-dark">Recuperar Contraseña</h3>
                <p class="text-muted small text-center">Ingresa tu correo para enviarte el enlace.</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-warning w-100 fw-bold shadow-sm">Enviar enlace</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
