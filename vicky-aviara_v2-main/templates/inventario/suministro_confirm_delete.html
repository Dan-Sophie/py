{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0" style="border-radius: 15px;">
                <div class="card-body text-center p-5">
                    <i class="fas fa-exclamation-circle text-danger mb-4" style="font-size: 4rem;"></i>
                    <h3 class="font-weight-bold">¿Estás seguro?</h3>
                    <p class="text-muted">
                        Estás a punto de eliminar el registro de <strong>{{ item.producto }}</strong> 
                        (Lote del {{ item.fecha_cosecha }}). esta acción no se puede deshacer.
                    </p>
                    <hr>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-around mt-4">
                            <a href="{% url 'inventario_list' %}" class="btn btn-light btn-round px-4">Cancelar</a>
                            <button type="submit" class="btn btn-danger btn-round px-4">Sí, Eliminar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
